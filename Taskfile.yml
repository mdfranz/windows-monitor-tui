version: "3"
tasks:
  build:
    desc: Build and sign the monitor binary
    cmds:
      - go build -o monitor.exe .
      - task: sign

  sign:
    desc: Self-sign the monitor binary
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ./sign.ps1

  trust:
    desc: Trust the dev certificate (Requires Admin)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ./trust-cert.ps1

  run:
...

    desc: Run the monitor
    cmds:
      - go run .

  clean:
    desc: Remove built binaries
    cmds:
      - cmd: del monitor.exe
        ignore_error: true

  test:
    desc: Run tests
    cmds:
      - go test -v ./...
